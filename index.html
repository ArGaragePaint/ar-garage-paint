<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR GARAGE PAINT MIXING</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111;
color:white;
padding:20px;
margin:0;
}

.container{
max-width:500px;
margin:auto;
background:#1b1b1b;
padding:20px;
border-radius:15px;
}

h1{
text-align:center;
color:#00d4ff;
}

select,input{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
width:100%;
padding:15px;
font-size:18px;
background:#00d4ff;
border:none;
border-radius:10px;
font-weight:bold;
}

.result{
margin-top:20px;
background:#292929;
padding:15px;
border-radius:10px;
line-height:2;
}
</style>
</head>

<body>

<div class="container">

<h1>AR GARAGE PAINT MIXING</h1>

<label>Jenis Rasio</label>

<select id="ratio">
<option value="4,1,2">4 : 1 : 2</option>
<option value="2,1,1">2 : 1 : 1</option>
<option value="2,1,0.5">2 : 1 : 0.5</option>
<option value="1,1,0">1 : 1</option>
</select>

<label>Jumlah Cat (ml)</label>

<input type="number" id="paint" placeholder="Contoh 200">

<button onclick="hitung()">Hitung</button>

<div class="result" id="hasil">

Masukkan jumlah cat.

</div>

</div>

<script>

function hitung(){

let r=document.getElementById("ratio").value.split(",");

let cat=parseFloat(document.getElementById("paint").value);

if(isNaN(cat)){
alert("Masukkan jumlah cat.");
return;
}

let base=parseFloat(r[0]);
let hard=parseFloat(r[1]);
let thinner=parseFloat(r[2]);

let hardener=cat/base*hard;
let tiner=cat/base*thinner;

let total=cat+hardener+tiner;

document.getElementById("hasil").innerHTML=

"<b>Base :</b> "+cat.toFixed(1)+" ml<br>"+
"<b>Hardener :</b> "+hardener.toFixed(1)+" ml<br>"+
"<b>Thinner :</b> "+tiner.toFixed(1)+" ml<br><br>"+
"<b>Total :</b> "+total.toFixed(1)+" ml";

}

</script>

</body>
</html>
